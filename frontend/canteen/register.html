<!DOCTYPE html>
<html>
<head>
<title>Canteen Register</title>
<link rel="stylesheet" href="../common/style.css">
</head>

<body>

<div class="navbar">Canteen Register</div>

<div class="container">

<input id="name" placeholder="Owner Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<select id="canteen">
<option value="1">Maggi Hotspot</option>
<option value="2">Southern Stories</option>
<option value="3">SnapEats</option>
<option value="4">Infinity Kitchen</option>
</select><br><br>

<button onclick="register()">Register</button>

<p id="msg"></p>

</div>

<script>
function register(){

fetch("http://127.0.0.1:5000/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
email:email.value,
password:password.value,
role:"canteen",
canteen_id:canteen.value
})
})
.then(r=>r.json())
.then(d=>{
msg.innerText = d.msg || d.error
})
}
</script>

</body>
</html>
