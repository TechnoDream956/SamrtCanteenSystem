<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Smart Canteen to order food from your campus canteen.">
  <title>Login — Smart Canteen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/style.css">
  <script src="../common/app.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">
    <div class="logo-icon">🍽️</div>
    SmartCanteen
  </a>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div style="font-size:44px;margin-bottom:18px;">👋</div>
    <h2>Welcome back</h2>
    <p class="subtitle">Login to order food from your canteen</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="you@college.edu" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-full" onclick="doLogin()" id="loginBtn">Login →</button>
    <div id="msg" class="msg msg-error"></div>

    <p class="switch-link">Don't have an account? <a href="register.html">Create one free</a></p>
  </div>
</div>

<script>
function doLogin(){
  const email    = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value
  const btn      = document.getElementById("loginBtn")
  const msg      = document.getElementById("msg")

  msg.className = "msg msg-error"
  msg.innerText = ""

  if(!email || !password){
    msg.innerText = "Please enter your email and password."
    msg.className = "msg msg-error show"; return
  }

  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>&nbsp;Logging in...'

  fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })
  .then(r => r.json())
  .then(d => {
    if(d.error){
      msg.innerText = d.error
      msg.className = "msg msg-error show"
      btn.disabled = false; btn.innerHTML = "Login →"; return
    }
    localStorage.setItem("token", d.token)
    localStorage.setItem("user",  JSON.stringify(d))

    const redirect = localStorage.getItem("redirectAfterLogin")
    if(redirect){ localStorage.removeItem("redirectAfterLogin"); window.location = redirect }
    else { window.location = "index.html" }
  })
  .catch(() => {
    msg.innerText = "Could not connect to server. Is the backend running?"
    msg.className = "msg msg-error show"
    btn.disabled = false; btn.innerHTML = "Login →"
  })
}

document.addEventListener("keydown", e => { if(e.key === "Enter") doLogin() })
</script>

</body>
</html>
